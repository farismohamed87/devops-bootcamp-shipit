name: deploy
on: [push, workflow_dispatch]
defaults:
  run:
    working-directory: launchpad

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        # Note: If your repository specifically requires version 7, change the @v4 above to @v7
      - run: npm clean-install
      - run: npm run test
- run: bash scripts/report.sh
        env:
          BOARD_URL: ${{ vars.BOARD_URL }}
          SHIPIT_TOKEN: ${{ secrets.SHIPIT_TOKEN }}
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm clean-install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: launchpad/dist
      - uses: actions/deploy-pages@v5

# tambah di bawah sekali
permissions:
  pages: write
  id-token: write
